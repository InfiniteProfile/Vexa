        // Seeded values to ensure asymmetric layout variations persist consistently 
        // across profile mappings without visual jumpiness on re-filtering.
        const structuralLayoutMetadata = creatorsData.map((creator, index) => {
            const aspectRatios = ['aspect-[3/4]', 'aspect-[4/5]', 'aspect-[1/1]', 'aspect-[2/3]'];
            const heightPaddings = ['pb-12', 'pb-4', 'pb-16', 'pb-8'];
            const verticalOffsets = ['translate-y-0', 'sm:translate-y-4', 'sm:-translate-y-2', 'sm:translate-y-8'];
            
            return {
                ...creator,
                id: `creator-${index}`,
                aspectRatio: aspectRatios[index % aspectRatios.length],
                padding: heightPaddings[(index + 1) % heightPaddings.length],
                offset: verticalOffsets[(index + 2) % verticalOffsets.length]
            };
        });

        const masonryContainer = document.getElementById('masonryContainer');
        const searchBar = document.getElementById('searchBar');
        const emptyState = document.getElementById('emptyState');

        // Dynamically compute layout breakdown mapping columns
        function getColumnCount() {
            if (window.innerWidth >= 1024) return 4; // Desktop
            if (window.innerWidth >= 768) return 2;  // Tablet
            return 1;                                // Mobile
        }

        // Main Rendering Logic Engine
        function renderGrid(filterQuery = '') {
            const columnsCount = getColumnCount();
            masonryContainer.innerHTML = '';
            
            // Clean dynamic filtering array matching criteria
            const filteredData = structuralLayoutMetadata.filter(creator => 
                creator.name.toLowerCase().includes(filterQuery.toLowerCase())
            );

            if (filteredData.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            // Instantiate array structural buckets matching design matrix columns
            const columns = Array.from({ length: columnsCount }, () => document.createElement('div'));
            columns.forEach(col => col.className = "flex-1 flex flex-col gap-8");

            // Distribute individual profiles into targeted structural array tracks
            filteredData.forEach((creator, idx) => {
                const targetColumnIndex = idx % columnsCount;
                
                const card = document.createElement('div');
                // Merging broken grid attributes cleanly
                card.className = `group relative w-full bg-zinc-900/20 border border-white/[0.04] rounded-2xl overflow-hidden transition-all duration-500 hover:-translate-y-1 hover:border-purple-500/30 neon-border-glow ${creator.padding} ${creator.offset}`;
                
                card.innerHTML = `
                    <div class="relative w-full ${creator.aspectRatio} overflow-hidden bg-zinc-950">
                        <img 
                            src="${creator.image}" 
                            alt="${creator.name}" 
                            loading="lazy"
                            class="w-full h-full object-cover transition-transform duration-700 ease-out scale-100 group-hover:scale-105 filter brightness-[0.9] group-hover:brightness-100"
                        />
                        <div class="absolute inset-0 bg-gradient-to-t from-[#09090b] via-transparent to-transparent opacity-80 transition-opacity duration-300 group-hover:opacity-40"></div>
                        
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-20 bg-black/20 backdrop-blur-[2px]">
                            <button class="px-5 py-2 text-xs font-semibold tracking-widest text-white uppercase bg-white/10 hover:bg-white text-zinc-900 border border-white/20 hover:border-white rounded-full transition-all duration-300 transform translate-y-2 group-hover:translate-y-0 shadow-lg backdrop-blur-md">
                                View Network
                            </button>
                        </div>
                    </div>

                    <div class="absolute bottom-0 left-0 right-0 p-5 z-10 flex items-center justify-between pointer-events-none">
                        <div class="transform group-hover:translate-x-1 transition-transform duration-300">
                            <h3 class="font-syne text-sm uppercase tracking-wider text-white font-bold drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)]">
                                ${creator.name}
                            </h3>
                            <p class="text-[10px] uppercase tracking-widest text-pink-400 font-medium opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                                @vexa_talent
                            </p>
                        </div>
                        <div class="w-8 h-8 rounded-full border border-white/10 bg-zinc-950/80 backdrop-blur-md flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 scale-75 group-hover:scale-100">
                            <svg class="w-3.5 h-3.5 text-purple-400" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                            </svg>
                        </div>
                    </div>
                `;
                
                columns[targetColumnIndex].appendChild(card);
            });

            // Append finalized processed columns array onto layout DOM wrapper context
            columns.forEach(col => masonryContainer.appendChild(col));
        }

        // Event Filtering Listeners Mapping Hooks
        searchBar.addEventListener('input', (e) => {
            renderGrid(e.target.value);
        });

        // Watch window scale adjustments to smoothly restructure responsive layouts real-time
        let resizeDebounceTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeDebounceTimeout);
            resizeDebounceTimeout = setTimeout(() => {
                renderGrid(searchBar.value);
            }, 150);
        });

        // Bootstrap Application View Configuration Instance Execution
        renderGrid();
    </script>
</body>
</html>
